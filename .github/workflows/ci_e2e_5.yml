name: 05 - Monitoramento Contínuo Cypress E2E
on:
  # push:
  #   branches:
  #   - main
  # schedule:
  #   - cron: "*/11 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Cypress Run - Testes E2E UTP
        uses: cypress-io/github-action@v7
        id: cypress
        continue-on-error: true
        with:
          command: npx cypress run --browser electron --spec 'cypress/e2e/00_smoke/**/*.cy.js'
          # --spec 'cypress/e2e/{05_link_conexao,06_cards_duvidas_frequentes}/**/*.cy.js'

        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN1: ${{ secrets.LOGIN1 }}
          SENHA1: ${{ secrets.SENHA1 }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CYPRESS_INTERNAL_NPM_REGISTRY_DISABLE_SSL_VERIFICATION: "1" # Força o bypass no Cypress

      - name: Debug - listar arquivos
        run: ls -R cypress/reports || true

      - name: Deploy do Relatório para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports
          destination_dir: reports/${{ github.run_number }}/02_e2e
          keep_files: true
          force_orphan: false

      - name: Enviar E-mail de SUCESSO ✅
        if: steps.cypress.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅[ESTÁVEL] Giro/Wemobi/UTP - Monit. Cont."
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo E2E"
          body: |
            Monitoramento Cypress - UTP

            O ciclo de monitoramento contínuo foi finalizado com sucesso.

            📂 RELATÓRIOS DISPONÍVEIS:
              
            🔗 PAINEL EXECUTIVO (HTML): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/02_e2e/index.html

            📂 ÁREAS VALIDADAS:
            • [00] Smoke Tests - Críticos (Busca de Destinos, Datas, Passagens, Assentos e finalização de compra) - (Não implementado: Cupons, Remarcação, Cancelamento)
            • [01] Autenticação
            • [02] Conta Giro
            • [03/07] Integridade de Links

            Detalhes técnicos: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Enviar E-mail de FALHA 🚨
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨[ALERTA] Giro/Wemobi/UTP - Monit. Cont."
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo E2E"
          body: |
            🚨 RELATÓRIO DE FALHA DETECTADA

            🔍 INVESTIGAÇÃO RÁPIDA

            📊 ACESSAR RELATÓRIO COMPLETO: 
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/02_e2e/index.html

            💡 POSSÍVEIS CAUSAS:
            1. Instabilidade na API de busca ou login do site.
            2. Alteração de seletores (Placeholders/IDs) no front-end.
            3. Lentidão excessiva no carregamento (Timeout).

            🛠️ LOGS GERAIS: 
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Este alerta foi gerado automaticamente pelo sistema de Qualidade de Software.
