name: Monitoramento Contínuo Cypress

on:
  # push:
  #     branches:
  #       - main
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: 

jobs:
  cypress-run:
    runs-on: ubuntu-latest 
    # self-hosted
    strategy:
          fail-fast: false
          matrix:
            containers: [1, 2, 3]  # 🔥 paralelismo
    

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        
      - name: Limpar Relatórios Antigos
        run: rm -rf cypress/reports/html/*

      - name: Cypress Run - Testes E2E Viação Cometa
        uses: cypress-io/github-action@v6
        id: cypress
        with:

            command: npx cypress run --browser chrome --parallel --reporter mochawesome --reporter-options reportDir=cypress/reports/html,overwrite=true,html=true,json=true,reportFilename=index
            # command: npx cypress run --browser chrome --record --key ${{ secrets.CYPRESS_RECORD_KEY }} --parallel --group "Smoke Tests" --reporter mochawesome --reporter-options reportDir=cypress/reports/html,overwrite=true,html=true,json=true,reportFilename=index


          # command: npx cypress run --browser chrome --spec cypress/e2e/00_run-all.cy.js --reporter mochawesome --reporter-options reportDir=cypress/reports/html,overwrite=true,html=true,json=true,reportFilename=index
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload Relatório (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.containers }}
          path: cypress/reports/html

  notify:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()

    steps:
      - name: Download relatórios
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge relatórios (opcional)
        run: |
          mkdir merged
          cp -r reports/*/* merged/ || true

      - name: Deploy do Relatório para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./merged
          force_orphan: true      
          
      - name: Enviar E-mail de SUCESSO ✅
        if: needs.cypress-run.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "(EM TESTE) ✅ [ESTÁVEL] Monitoramento Integrado - Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          # html_body: true
          body: |
            <h2 style="color:#2e7d32;">📊 Monitoramento Cypress - Viação Cometa</h2>

            <p>O ciclo de monitoramento contínuo foi finalizado com sucesso. Todos os sistemas críticos estão operacionais.</p>

            <p><strong>📂 ÁREAS VALIDADAS:</strong></p>
            <ul>
              <li><strong>[00] Smoke Tests</strong> (Fluxos Principais - Seleção de Origem e Destino, Datas, Busca de Passagens, Assentos)</li>
              <li><strong>[01] Autenticação</strong> (Login)</li>
              <li><strong>[02] Conta Giro</strong> (Login)</li>
              <li><strong>[03/07] Integridade de Links</strong> (Header e Footer)</li>
              <li><strong>[04/05/06] Ofertas, Conexões e FAQ</strong></li>
            </ul>

            <p><strong>🔗 PAINEL EXECUTIVO (HTML):</strong><br>
            <a href="https://andersonsilva-jca.github.io/teste_e2eViacaoCometa/">Acessar relatório</a></p>

            # <p><strong>🔗 CYPRESS CLOUD (VÍDEOS/DASHBOARD):</strong><br>
            # <a href="https://cloud.cypress.io/projects/yc5eka/runs">Acessar dashboard</a></p>

            <p>Os fluxos login, busca de passagens, conta giro, links do header e footer estão funcionando corretamente.</p>

            <p><strong>🔎 Detalhes da execução:</strong><br>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
            Ver execução no GitHub
            </a></p>
            

      - name: Enviar E-mail de FALHA 🚨
        if: needs.cypress-run.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "(EM TESTE) 🚨 [ALERTA] Falha Detectada - Monitoramento Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          # html_body: true
          body: |
            <h2 style="color:#c62828;">🚨 RELATÓRIO DE FALHA DETECTADA</h2>

            <p><strong>🔍 DETALHES DA EXECUÇÃO:</strong></p>
            <ul>
              <li><strong>Gatilho:</strong> ${{ github.event_name == 'schedule' && 'Agendamento Automático de 5 em 5 minutos' || 'Execução Manual' }}</li>
              <li><strong>Responsável:</strong> ${{ github.actor }}</li>
              <li><strong>Status:</strong> <span style="color:#c62828;"><strong>Erro em uma ou mais suítes de teste</strong></span></li>
            </ul>

            <p><strong>💡 POSSÍVEIS CAUSAS:</strong></p>
            <ol>
              <li>Instabilidade na API de busca ou login do site</li>
              <li>Alteração de seletores (IDs, classes, placeholders) no front-end</li>
              <li>Lentidão excessiva no carregamento (Timeout)</li>
            </ol>

            <p><strong>🛠️ PLANO DE AÇÃO:</strong></p>
            <ol>
              # <li>
              #   <strong>Analise o erro no Cypress Cloud:</strong><br>
              #   📺 <a href="https://cloud.cypress.io/projects/yc5eka/runs">Ver execução no Cloud</a>
              # </li>
              <br>
              <li>
                <strong>Verifique prints e relatório HTML:</strong><br>
                📊 <a href="https://andersonsilva-jca.github.io/teste_e2eViacaoCometa/">Abrir relatório HTML</a>
              </li>
              <br>
              <li>
                <strong>Analise evidências completas (GitHub Actions):</strong><br>
                🔗 <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Ver execução detalhada
                </a>
              </li>
            </ol>

            <hr>

            <p style="font-size:12px;color:gray;">
              Este alerta foi gerado automaticamente pelo sistema de Qualidade de Software.
            </p>



