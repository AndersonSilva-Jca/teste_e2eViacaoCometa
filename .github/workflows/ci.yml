name: Monitoramento Contínuo Cypress

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  cypress-run:
    runs-on: ubuntu-latest 
    # self-hosted

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Cypress Run - Testes E2E Viação Cometa
        uses: cypress-io/github-action@v6
        id: cypress
        continue-on-error: true
        with:
          browser: chrome
          # Já que é no seu PC, não precisa instalar tudo toda vez se já tiver a node_modules
          # install: false 
          spec: cypress/e2e/00_run-all.cy.js --reporter mochawesome --reporter-options reportDir="cypress/reports",overwrite=true,html=true,json=false,reportFilename="index"
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Deploy do Relatório para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports/html/
          force_orphan: true      
          
      - name: Enviar E-mail de SUCESSO ✅
        if: steps.cypress.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Monitoramento Cypress - Site Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            Monitoramento Cypress - Viação Cometa

            Todos os testes passaram com sucesso! 🚀

            🔗 ACESSAR RELATÓRIO: https://andersonsilva-jca.github.io/teste_e2eViacaoCometa/

            Os fluxos login, busca de passagens, conta giro, links do header e footer estão funcionando corretamente.

            Detalhes técnicos da execução: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            

      - name: Enviar E-mail de FALHA 🚨
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 Falha Detectada - Monitoramento Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            RELATÓRIO DE FALHA DETECTADA 🚨

            🔗 ACESSAR RELATÓRIO ONLINE: https://andersonsilva-jca.github.io/teste_e2eViacaoCometa/

            ---
            ❌ GATILHO DO ERRO: ${{ github.event_name == 'schedule' && 'Agendamento Automático' || github.event_name == 'push' && 'Novo Código (Push)' || 'Execução Manual' }}
            ❌ EXECUTADO POR: ${{ github.actor }}
            ---

            RESUMO DOS TESTES:
            O Cypress encontrou um erro. Isso pode indicar instabilidade no site ou falha no login.

            COMO ANALISAR:
            1. Clique no link do Relatório acima para ver o erro detalhado.
            2. Se precisar de vídeos ou screenshots, acesse a aba "Artifacts" aqui: 
               https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Verifique o log do passo "Rodar Testes Viação Cometa".
