name: Monitoramento Contínuo Cypress

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch: 

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # O action oficial do Cypress já faz Setup do Node, Instala e faz Cache automático
      # Isso economiza cerca de 1 a 2 minutos de execução
      - name: Testes Viação Cometa - Cypress
        uses: cypress-io/github-action@v6
        id: cypress
        continue-on-error: true
        with: 
          spec: cypress/e2e/00_smoke/**/*
          browser: chrome
        env:
          # Verifique se no GitHub Secrets os nomes são exatamente LOGIN e SENHA
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
      - name: Enviar E-mail de SUCESSO ✅
        if: |
          steps.cypress.outcome == 'success' && 
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.schedule == '0 20 * * *')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Monitoramento Cypress - Site Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            Monitoramento Cypress - Viação Cometa

            Todos os testes passaram com sucesso! 🚀
            

      - name: Enviar E-mail de FALHA 🚨
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 Falha Detectada - Monitoramento Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            RELATÓRIO DE FALHA DETECTADA 🚨

            📊 O relatório detalhado está disponível em:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            ❌ GATILHO: ${{ github.event_name }} agendado para rodar os testes de 5 em 5 minutos.
            ❌ EXECUTADO POR: ${{ github.actor }}
            ---
