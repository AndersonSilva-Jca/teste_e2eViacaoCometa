name: Monitoramento Contínuo Cypress

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Dependências
        run: npm install

      # - name: Dar permissão ao Cypress
      #   run: chmod +x ./node_modules/.bin/cypress

      - name: Rodar Testes Viação Cometa
        id: cypress
        continue-on-error: true
        # Adicionado o prefixo xvfb-run para evitar erros em servidores Linux (Ubuntu)
        run: xvfb-run npx cypress run "cypress/e2e/00_smoke/**/*" 
        env:
          # Verifique se no GitHub Secrets os nomes são exatamente LOGIN e SENHA
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}

      - name: Enviar E-mail de SUCESSO ✅
        if: |
          steps.cypress.outcome == 'success' && 
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.schedule == '0 20 * * *')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Monitoramento Cypress - Site Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            Monitoramento Cypress - Viação Cometa

            Todos os testes passaram com sucesso! 🚀
            

      - name: Enviar E-mail de FALHA 🚨
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 Falha Detectada - Monitoramento Viação Cometa"
          to: anderson.ssantos@jcatlm.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            RELATÓRIO DE FALHA DETECTADA 🚨

            📊 O relatório detalhado está disponível em:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            ❌ GATILHO: ${{ github.event_name }} agendado
            ❌ EXECUTADO POR: ${{ github.actor }}
            ---
