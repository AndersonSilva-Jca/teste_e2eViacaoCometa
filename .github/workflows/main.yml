name: Monitoramento Contínuo Cypress

on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch:      # Permite rodar manualmente clicando num botão no GitHub

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Define a versão do Node explicitamente para evitar o warning de depreciação
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Ou 22 para já ficar atualizado

      - name: Instalar Dependências
        run: npm ci # Usa o package-lock.json para instalar exatamente o que você tem local

      - name: Rodar Testes Cypress
        id: cypress
        continue-on-error: true
        # O comando que você confirmou, com aspas para garantir o caminho
        run: npx cypress run --spec "cypress/e2e/01_busca_passagens/**/*"
        env:
          # Garanta que esses segredos existam no GitHub Settings > Secrets
          CYPRESS_LOGIN_EMAIL: ${{ secrets.CYPRESS_LOGIN }}
          CYPRESS_LOGIN_SENHA: ${{ secrets.CYPRESS_SENHA }}

      - name: Enviar Alerta por E-mail (Se falhar)
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 FALHA DETECTADA: Monitoramento Cypress - Viação Cometa"
          to: anderson.ssantos@jcatml.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            Um ou mais testes falharam no site da Viação Cometa (ou outros implementados).
            
            Repositório: ${{ github.repository }}
            Link do Erro: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Verifique os vídeos e prints anexados no link acima.