name: Monitoramento Contínuo Cypress

on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch:      # Permite rodar manualmente clicando num botão no GitHub
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Força o uso de uma versão estável do Node para evitar avisos
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 

      # Instala dependências do sistema Linux que o Cypress exige para abrir o navegador
      - name: Install Cypress Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb

      - name: Instalar Dependências do Projeto
        run: npm install

      - name: Rodar Testes Cypress
        id: cypress
        continue-on-error: true 
        # Comando conforme sua pasta específica
        run: npx cypress run --spec "cypress/e2e/01_busca_passagens/**/*.cy.js"
        env:
          CYPRESS_LOGIN_EMAIL: ${{ secrets.CYPRESS_LOGIN }}
          CYPRESS_LOGIN_SENHA: ${{ secrets.CYPRESS_SENHA }}

      - name: Enviar Alerta por E-mail (Se falhar)
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 FALHA DETECTADA: Monitoramento Cypress - Viação Cometa"
          to: anderson.ssantos@jcatml.com.br
          from: "Monitoramento Contínuo Cypress"
          body: |
            Os testes na pasta 01_busca_passagens falharam.
            
            Repositório: ${{ github.repository }}
            Link do Erro: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
